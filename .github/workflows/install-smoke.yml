name: install-smoke
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        # The install integration test (tests/kg/install/) imports only
        # stdlib + pytest. Bootstrap shells out to systemctl and pip, but
        # the test intercepts both via a subprocess.run shim, so no real
        # systemd or pip invocations occur on the runner.
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
      - name: Run install integration test
        run: python3 -m pytest tests/kg/install/ -q
