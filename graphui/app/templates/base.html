<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}graphui{% endblock %} · concorda</title>
  <link rel="stylesheet" href="/graph/static/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/graph/" class="brand">graphui</a>
    <nav>
      <a href="/graph/">index</a>
      <a href="/graph/review">review</a>
      <a href="/graph/?kind=rule">rules</a>
      <a href="/graph/?kind=ontology">ontology</a>
    </nav>
    <span class="meta-stamp">
      {% if meta and meta.depgraph %}
        depgraph {{ meta.depgraph.git_commit[:8] }} · {{ meta.depgraph.node_count }} nodes
      {% endif %}
    </span>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
