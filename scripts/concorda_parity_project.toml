[project]
primary_repo = "api"

[logigraph]
data_dir = "~/concorda-knowledge-graph/logigraph"

[repos.api]
path = "~/concorda-api"
extractor = ["python3", "{kg_dir}/depgraph/extractors/generic/python/extract.py"]
detectors = ["fastapi", "sqlalchemy", "pydantic", "pytest", "service"]
files_arg = "--only"

[repos.web]
path = "~/concorda-web"
extractor = ["npx", "tsx", "{kg_dir}/depgraph/extractors/generic/typescript/extract.ts"]
detectors = ["react", "vitest", "route-calls", "service"]

[repos.test]
path = "~/concorda-test"
extractor = ["npx", "tsx", "{kg_dir}/depgraph/extractors/generic/typescript/extract.ts"]
detectors = ["vitest", "service"]
