[pytest]
addopts = --import-mode=importlib
# `fixtures/` under any subsystem is sample-project source for the tests
# above it (e.g. depgraph/tests/fixtures/wild/kitchen_sink/api/tests/
# contains a synthetic FastAPI test suite that exists to be EXTRACTED,
# not run). Pytest at the repo root would otherwise try to collect those
# as real tests and fail on the synthetic project's deps. Subsystem
# pyproject.toml files set the same exclusion when run from their own
# rootdir; this entry makes the umbrella `pytest` invocation work too.
norecursedirs = fixtures
