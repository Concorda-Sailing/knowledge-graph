[pytest]
addopts = --import-mode=importlib
# `fixtures/` under any subsystem is sample-project source for the tests
# above it (e.g. depgraph/tests/fixtures/wild/kitchen_sink/api/tests/
# contains a synthetic FastAPI test suite that exists to be EXTRACTED,
# not run). Pytest at the repo root would otherwise try to collect those
# as real tests and fail on the synthetic project's deps. Subsystem
# pyproject.toml files set the same exclusion when run from their own
# rootdir; this entry makes the umbrella `pytest` invocation work too.
# Also exclude .claude/ — the /loop-driven roadmap uses worktree-isolated
# background agents whose worktrees mirror the full repo tree under
# .claude/worktrees/agent-*. Without exclusion, pytest tries to collect
# tests inside each worktree, hitting "Plugin already registered" since
# the same conftest module loads multiple times.
norecursedirs = fixtures .claude
# Mirror depgraph/pyproject.toml so the marker is recognized when this
# umbrella pytest.ini is the active configfile (e.g. `pytest -q` from the
# repo root) — otherwise pytest raises PytestUnknownMarkWarning.
markers =
    memory_budget: peak-RSS smoke test for the TS extractor (requires /usr/bin/time -v; opt-out via `-m 'not memory_budget'`).
